# Build and push service images to Docker Hub for EKS (or any k8s) to pull.
# This workflow does not run kubectl/helm — add a second job or workflow when you apply manifests.
#
# Repository configuration (Settings → Secrets and variables → Actions):
#   - Variable:  DOCKERHUB_USERNAME  → your Docker Hub namespace (user or org name, public).
#   - Secret:     DOCKERHUB_TOKEN   → a Docker Hub access token (not your account password).
#     See: https://docs.docker.com/docker-hub/access-tokens/
#
# Images pushed (on non-PR runs to a configured default branch, see tags below):
#   {DOCKERHUB_USERNAME}/recruitai-nextjs-web
#   {DOCKERHUB_USERNAME}/recruitai-cv-parser-worker
#   {DOCKERHUB_USERNAME}/recruitai-evaluator-worker
# Executor worker is intentionally omitted.

name: deploy-eks

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

concurrency:
  group: deploy-eks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  build-and-push:
    name: 'Image: ${{ matrix.image }}'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: nextjs-web, image: recruitai-nextjs-web }
          - { service: cv-parser-worker, image: recruitai-cv-parser-worker }
          - { service: evaluator-worker, image: recruitai-evaluator-worker }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker Hub namespace (pushes only)
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "$DOCKERHUB_USER" ]; then
            echo "::error::Set the Actions repository variable DOCKERHUB_USERNAME to your Docker Hub user or org."
            exit 1
          fi
        env:
          DOCKERHUB_USER: ${{ vars.DOCKERHUB_USERNAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # When DOCKERHUB_USERNAME is empty (e.g. forked PRs), use a throwaway name — build still succeeds; push is skipped on PRs.
          images: ${{ (vars.DOCKERHUB_USERNAME != '' && vars.DOCKERHUB_USERNAME) || 'unconfigured' }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ (github.ref_name == 'main' || github.ref_name == 'master') && github.event_name == 'push' }}
            type=sha,prefix=sha-
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        # v7 (BuildKit) — use path context (see "context" below) so the repo checkout and .dockerignore apply.
        uses: docker/build-push-action@v7
        with:
          context: ./services/${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' && vars.DOCKERHUB_USERNAME != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "Digest ${{ steps.build.outputs.digest }}"
